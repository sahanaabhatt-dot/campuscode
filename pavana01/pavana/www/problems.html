<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="redirect.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problems - CampusCode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .problems-page { background: #0f0a1a; min-height: 100vh; }

        .problems-header {
            background: #1a0a2e;
            padding: 1.2rem 2rem;
            border-bottom: 1px solid #2a1a3d;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .problems-header h2 { color: #fff; font-size: 1.2rem; margin: 0; }

        .solved-counter {
            color: #b0b0b0;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .solved-counter span { color: #e91e63; font-weight: bold; }

        .search-bar {
            display: flex;
            align-items: center;
            background: #2a1a3d;
            border: 1px solid #3d2a52;
            border-radius: 20px;
            padding: 0.4rem 1rem;
            gap: 0.5rem;
            flex: 1;
            max-width: 300px;
        }
        .search-bar input {
            background: none;
            border: none;
            outline: none;
            color: #e0e0e0;
            font-size: 0.9rem;
            width: 100%;
        }
        .search-bar input::placeholder { color: #666; }

        .filter-bar {
            background: #150a25;
            padding: 0.8rem 2rem;
            border-bottom: 1px solid #2a1a3d;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-btn {
            background: #2a1a3d;
            border: 1px solid #3d2a52;
            color: #b0b0b0;
            padding: 0.3rem 0.9rem;
            border-radius: 15px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #e91e63;
            border-color: #e91e63;
            color: #fff;
        }

        .semester-tabs {
            background: #1a0a2e;
            padding: 0.6rem 2rem;
            border-bottom: 1px solid #2a1a3d;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .sem-tab {
            background: none;
            border: 1px solid #3d2a52;
            color: #b0b0b0;
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.82rem;
            transition: all 0.2s;
        }
        .sem-tab:hover, .sem-tab.active {
            background: #3d2a52;
            color: #fff;
            border-color: #e91e63;
        }

        .problems-table { width: 100%; border-collapse: collapse; }

        .problems-table thead tr {
            background: #150a25;
            border-bottom: 1px solid #2a1a3d;
        }
        .problems-table th {
            padding: 0.7rem 1.5rem;
            text-align: left;
            color: #666;
            font-size: 0.82rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .problems-table tbody tr {
            border-bottom: 1px solid #1a0a2e;
            transition: background 0.2s;
            cursor: pointer;
        }
        .problems-table tbody tr:hover { background: #1a0a2e; }
        .problems-table tbody tr.solved { opacity: 0.6; }

        .problems-table td {
            padding: 0.8rem 1.5rem;
            font-size: 0.9rem;
            color: #e0e0e0;
        }

        .td-status { width: 40px; text-align: center; }
        .td-num { color: #666; width: 60px; }
        .td-title { color: #e0e0e0; }
        .td-title:hover { color: #e91e63; }
        .td-acceptance { color: #b0b0b0; width: 100px; }
        .td-difficulty { width: 100px; }
        .td-time { width: 110px; color: #b0b0b0; font-size: 0.85rem; }
        .time-easy { color: #4ade80; }
        .time-medium { color: #fbbf24; }
        .time-hard { color: #f87171; }

        .subject-row td {
            background: #1a0a2e;
            color: #e91e63;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.5rem 1.5rem;
            border-bottom: 1px solid #2a1a3d;
        }

        .diff-easy { color: #4ade80; font-weight: 600; }
        .diff-medium { color: #fbbf24; font-weight: 600; }
        .diff-hard { color: #f87171; font-weight: 600; }

        .check-icon { color: #4ade80; font-size: 1rem; }

        .problems-container { overflow-x: auto; }

        .no-results {
            text-align: center;
            padding: 3rem;
            color: #666;
        }
    </style>
</head>
<body class="problems-page">
    <header class="navbar">
        <div class="logo"><img src="logo.svg" alt="CampusCode Logo" style="height: 40px; vertical-align: middle; margin-right: 8px;"><span style="font-family: 'Righteous', sans-serif; letter-spacing: 1px;">CampusCode</span></div>
        <nav>
            <a href="index.html?home=1">Home</a>
            <a href="explore.html">Explore</a>
            <a href="problems.html">Problems</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="profile.html">Profile</a>
            <a href="#" id="logoutLink">Logout</a>
        </nav>
    </header>

    <div class="problems-page">
        <div class="problems-header">
            <h2>Practice Problems</h2>
            <div class="search-bar">
                <svg width="14" height="14" fill="none" stroke="#666" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <input type="text" id="searchInput" placeholder="Search questions...">
            </div>
            <div class="solved-counter">
                <span id="solvedCount">0</span> / <span id="totalCount">0</span> Solved
            </div>
        </div>

        <div class="semester-tabs" id="semesterTabs"></div>

        <div class="filter-bar">
            <button class="filter-btn active" onclick="filterDifficulty('all', this)">All</button>
            <button class="filter-btn" onclick="filterDifficulty('easy', this)">Easy</button>
            <button class="filter-btn" onclick="filterDifficulty('medium', this)">Medium</button>
            <button class="filter-btn" onclick="filterDifficulty('hard', this)">Hard</button>
        </div>

        <div class="problems-container">
            <table class="problems-table">
                <thead>
                    <tr>
                        <th class="td-status">Status</th>
                        <th class="td-num">#</th>
                        <th>Title</th>
                        <th class="td-acceptance">Acceptance</th>
                        <th class="td-difficulty">Difficulty</th>
                        <th class="td-time">Time Limit</th>
                    </tr>
                </thead>
                <tbody id="problemsBody"></tbody>
            </table>
            <div class="no-results" id="noResults" style="display:none;">No questions found.</div>
        </div>
    </div>

    <script src="data/syllabus.js"></script>
    <script src="script.js"></script>
    <script>

        document.getElementById('logoutLink').addEventListener('click', function(e) {
            e.preventDefault();
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        });
        let currentSemester = 'semester1';
        let currentDifficulty = 'all';
        let solvedProblems = JSON.parse(localStorage.getItem('solvedProblems') || '{}');

        // Default to the logged-in user's semester
        const _currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (_currentUser && _currentUser.semester) {
            currentSemester = 'semester' + _currentUser.semester;
        }

        function buildTabs() {
            const tabs = document.getElementById('semesterTabs');
            tabs.innerHTML = '';
            Object.keys(syllabus).forEach((key, i) => {
                const btn = document.createElement('button');
                btn.className = 'sem-tab' + (key === currentSemester ? ' active' : '');
                btn.textContent = syllabus[key].name;
                btn.onclick = () => {
                    document.querySelectorAll('.sem-tab').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                    currentSemester = key;
                    renderProblems();
                };
                tabs.appendChild(btn);
            });
        }

        function filterDifficulty(diff, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentDifficulty = diff;
            renderProblems();
        }

        function renderProblems() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const body = document.getElementById('problemsBody');
            const semester = syllabus[currentSemester];
            body.innerHTML = '';
            let total = 0, solved = 0, rowCount = 0;

            semester.subjects.forEach(subject => {
                let subjectRows = [];

                subject.problems.forEach((problem, idx) => {
                    if (currentDifficulty !== 'all' && problem.difficulty !== currentDifficulty) return;
                    if (search && !problem.title.toLowerCase().includes(search) && !subject.name.toLowerCase().includes(search)) return;

                    const key = subject.id + '_' + problem.id;
                    const isSolved = !!solvedProblems[key];
                    total++;
                    if (isSolved) solved++;

                    const acceptance = getAcceptance(problem.difficulty);
                    const diffLabel = problem.difficulty.charAt(0).toUpperCase() + problem.difficulty.slice(1);
                    const diffClass = 'diff-' + problem.difficulty;
                    const timeLimit = getTimeLimit(problem.difficulty);
                    const timeClass = 'time-' + problem.difficulty;

                    const tr = document.createElement('tr');
                    tr.className = isSolved ? 'solved' : '';
                    tr.innerHTML = `
                        <td class="td-status">${isSolved ? '<span class="check-icon">✓</span>' : ''}</td>
                        <td class="td-num">${problem.id}</td>
                        <td class="td-title" onclick="openQuestion('${subject.id}', ${problem.id - 1})">${problem.title}</td>
                        <td class="td-acceptance">${acceptance}</td>
                        <td class="td-difficulty"><span class="${diffClass}">${diffLabel}</span></td>
                        <td class="td-time"><span class="${timeClass}">⏱ ${timeLimit}</span></td>
                    `;
                    subjectRows.push(tr);
                    rowCount++;
                });

                if (subjectRows.length > 0) {
                    const subjectTr = document.createElement('tr');
                    subjectTr.className = 'subject-row';
                    subjectTr.innerHTML = `<td colspan="6">📚 ${subject.name} (${subject.code})</td>`;
                    body.appendChild(subjectTr);
                    subjectRows.forEach(r => body.appendChild(r));
                }
            });

            document.getElementById('solvedCount').textContent = solved;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('noResults').style.display = rowCount === 0 ? 'block' : 'none';
        }

        function getAcceptance(difficulty) {
            const ranges = { easy: [55, 75], medium: [35, 55], hard: [20, 40] };
            const [min, max] = ranges[difficulty];
            return (Math.floor(Math.random() * (max - min + 1)) + min) + '%';
        }

        function getTimeLimit(difficulty) {
            const limits = { easy: '3 min', medium: '6 min', hard: '10 min' };
            return limits[difficulty] || '6 min';
        }

        function openQuestion(subjectId, index) {
            window.location.href = `questions.html?subject=${subjectId}&q=${index}`;
        }

        document.getElementById('searchInput').addEventListener('input', renderProblems);

        buildTabs();
        renderProblems();
    </script>
</body>
</html>
